# HOW TO CREATE A RELEASE:
# 1. Go to GitHub → Releases → Create a new release
# 2. Tag version: v1.0.0 (contoh)
# 3. Title: v1.0.0
# 4. Generate release notes otomatis, atau tulis manual
# 5. Publish → trigger CD otomatis ke VPS

name: Create Release

on:
  push:
    tags:
      - 'v*'  # Trigger saat push tag v1.0.0, v1.1.0, dll

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "## Whatsappin v${GITHUB_REF_NAME#v}" > release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          echo "" >> release_notes.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)...HEAD --pretty=format:"- %s" --reverse >> release_notes.md 2>/dev/null || echo "- Initial release" >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
