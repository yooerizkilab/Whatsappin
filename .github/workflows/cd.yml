name: CD - Deploy to VPS

on:
  push:
    branches: [ master, main ]
  release:
    types: [ published ]

jobs:
  deploy:
    name: Deploy via Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.SERVER_PATH || '/opt/whatsapp-gateway' }}
            git pull origin master

            # Copy .env jika belum ada (pertama deploy)
            if [ ! -f .env ]; then
              cp Infrastruktur/env/.env.backend .env
              echo "⚠️ Edit .env terlebih dahulu: nano .env"
            fi

            # Build & restart
            docker compose -f Infrastruktur/docker-compose.prod.yml up -d --build

            # Bersihkan image lama
            docker image prune -f

            echo "✅ Deploy selesai!"
