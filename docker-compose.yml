version: '3.8'

services:
  # Database
  db:
    image: mysql:8.0
    container_name: whatsappin-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: whatsapp_gateway
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: whatsappin-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: whatsappin-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./Infrastruktur/env/.env.backend
    ports:
      - "3001:3001"
    volumes:
      - session_data:/app/sessions
    develop:
      watch:
        - path: ./backend/src
          action: sync

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:3001}
    container_name: whatsappin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  redis_data:
  session_data:
