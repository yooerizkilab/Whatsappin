version: '3.8'

services:
  # Database
  db:
    image: mysql:8.0
    container_name: whatsappin-db
    restart: always
    environment:
      MYSQL_DATABASE: whatsapp_gateway
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: whatsappin-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ../../backend
    container_name: whatsappin-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../env/.env.backend
    volumes:
      - session_data:/app/sessions

  # Frontend
  frontend:
    build:
      context: ../../frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_WS_URL: ${WS_URL}
    container_name: whatsappin-frontend
    restart: always
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: whatsappin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: whatsappin-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: whatsappin-grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    restart: always

volumes:
  mysql_data:
  redis_data:
  session_data:
  nginx_ssl:
  prometheus_data:
  grafana_data:
